<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title> ✍🏻 神奇畫畫機 </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { 
            margin: 0; font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', 'Segoe UI', sans-serif; 
            background: #e0f7fa; color: #333; 
            display: flex; flex-direction: column; align-items: center; padding: 15px; 
        }
        
        h1 { color: #ff5722; margin-bottom: 5px; text-align: center; font-size: 28px; text-shadow: 2px 2px 0px #fff; }
        
        #status-bar {
            margin-bottom: 15px; font-size: 22px; font-weight: bold; 
            background: #ffffff; padding: 15px 25px; border-radius: 20px; text-align: center;
            border: 4px solid #ffeb3b; width: 100%; max-width: 800px; box-sizing: border-box;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1); color: #00796b;
        }
        .instructions { font-size: 16px; color: #555; margin-top: 8px; font-weight: normal; }

        .top-toolbar { margin-bottom: 15px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .main-btn {
            padding: 15px 30px; font-size: 20px; font-weight: bold; cursor: pointer;
            border: none; border-radius: 15px; color: white;
            background-color: #4caf50; transition: all 0.1s; box-shadow: 0 6px 0 #2e7d32; 
        }
        .main-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #2e7d32; } 
        
        .main-btn.danger { background-color: #f44336; box-shadow: 0 6px 0 #c62828; }
        .main-btn.danger:active { box-shadow: 0 0 0 #c62828; }
        
        .main-btn.purple { background-color: #9c27b0; box-shadow: 0 6px 0 #6a1b9a; font-size: 22px;}
        .main-btn.purple:active { box-shadow: 0 0 0 #6a1b9a; }

        .tools-panel { 
            background: white; padding: 15px; border-radius: 20px; border: 3px solid #b2ebf2;
            margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-wrap: wrap; gap: 12px; 
            align-items: center; justify-content: center; width: 100%; max-width: 800px; box-sizing: border-box;
        }
        
        .tool-btn { 
            font-size: 16px; font-weight: bold; padding: 10px 15px; border-radius: 12px; 
            border: 2px solid #ccc; background: #fff; cursor: pointer; transition: 0.2s;
        }
        .tool-btn.active { background: #ffc107 !important; color: #333 !important; border-color: #ffa000; box-shadow: 0 4px 0 #ffa000; transform: translateY(-2px); }
        .tool-btn:active { transform: translateY(2px); box-shadow: none; }

        .color-palette { display: inline-flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-left: 10px; border-left: 2px dashed #eee; padding-left: 15px;}
        .color-btn { width: 40px; height: 40px; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.3); cursor: pointer; }
        .color-btn.selected { border: 4px solid #333; transform: scale(1.1); box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        
        #currentColorPreview { display: inline-block; width: 40px; height: 40px; border-radius: 50%; margin: 0 10px; vertical-align: middle; border: 4px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }

        #assemble-tools { display: none; background: #fff9c4; border-color: #fbc02d; }
        .scale-slider { width: 180px; margin: 0 10px; height: 20px; }

        .canvas-container {
            width: 100%; 
            max-width: 800px;
            margin-top: 10px;
        }
        .canvas-wrapper { 
            position: relative; 
            width: 100%; 
            padding-bottom: 75%; 
            background-image: linear-gradient(45deg, #e0e0e0 25%, transparent 25%), 
                              linear-gradient(-45deg, #e0e0e0 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #e0e0e0 75%), 
                              linear-gradient(-45deg, transparent 75%, #e0e0e0 75%);
            background-size: 30px 30px; background-position: 0 0, 0 15px, 15px -15px, -15px 0px;
            background-color: white; border: 4px solid #b0bec5; border-radius: 15px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            touch-action: none; 
            overflow: hidden; 
        }
        
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
        
        #referenceCanvas { opacity: 0.25; z-index: 1; } 
        #mainCanvas { z-index: 2; }                       
        #previewCanvas { z-index: 3; cursor: crosshair; }                 
    </style>
</head>
<body>

    <h1>✍🏻 神奇畫畫機</h1>
    
    <div id="status-bar">
        <div id="status-title">準備中...</div>
        <div id="status-desc" class="instructions"></div>
    </div>

    <div class="top-toolbar">
        <button id="btnNext" class="main-btn" onclick="nextStep()">✅ 畫好了，下一步！</button>
        <button id="btnAnimate" class="main-btn success" onclick="startAnimation()" style="display:none;">🕺 組合完成，讓他跳舞！</button>
        <button id="btnExportGIF" class="main-btn purple" onclick="exportGIF()" style="display:none;">🚀 發送到電視大螢幕！</button>
        <button onclick="location.reload()" class="main-btn danger">🔄 全部重來</button>
    </div>

    <div id="drawing-tools" class="tools-panel">
        <button id="pen" class="tool-btn active">✏️ 畫筆</button>
        <button id="fill" class="tool-btn">🪣 倒色</button>
        <button id="eraser" class="tool-btn">🧽 擦膠</button>
        <button id="undo" class="tool-btn">↩️ 倒退</button>
        <button id="clear" class="tool-btn">🗑️ 清空這一步</button>
        
        <div style="display: flex; align-items: center; margin-left: 10px; background: #f1f8e9; padding: 5px 10px; border-radius: 10px;">
            <span style="font-weight:bold;">粗細:</span> 
            <input type="range" id="size" min="5" max="80" value="15" style="width: 80px; margin: 0 10px;">
            <span id="sizeVal" style="display:inline-block; width:30px; font-weight:bold;">15</span>
        </div>
        
        <div class="color-palette">
            <span id="currentColorPreview" style="background:#000000; margin:0"></span>
            <input type="color" id="color" value="#000000" style="display:none;"> 
            <div class="color-btn selected" data-color="#000000" style="background:#000000"></div>
            <div class="color-btn" data-color="#f44336" style="background:#f44336"></div> 
            <div class="color-btn" data-color="#ff9800" style="background:#ff9800"></div> 
            <div class="color-btn" data-color="#ffeb3b" style="background:#ffeb3b"></div> 
            <div class="color-btn" data-color="#4caf50" style="background:#4caf50"></div> 
            <div class="color-btn" data-color="#2196f3" style="background:#2196f3"></div> 
            <div class="color-btn" data-color="#9c27b0" style="background:#9c27b0"></div> 
            <div class="color-btn" data-color="#ffffff" style="background:#ffffff"></div> 
        </div>
    </div>

    <div id="assemble-tools" class="tools-panel">
        <strong style="color: #e65100; font-size: 18px;">👇 點選圖片來放大縮小：<span id="selected-part-name" style="color:#000;">尚未選取</span></strong>
        <input type="range" id="scale-slider" class="scale-slider" min="0.2" max="3" step="0.1" value="1" disabled>
    </div>

    <div class="canvas-container">
        <div class="canvas-wrapper">
            <canvas id="referenceCanvas" width="800" height="600"></canvas>
            <canvas id="mainCanvas" width="800" height="600"></canvas>
            <canvas id="previewCanvas" width="800" height="600"></canvas>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔑 Firebase 設定
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDKgWtTKgKs9CjNEstyXsLQdAJMuznE8n0",
            authDomain: "characterwall.firebaseapp.com",
            databaseURL: "https://characterwall-default-rtdb.firebaseio.com",
            projectId: "characterwall",
            storageBucket: "characterwall.firebasestorage.app",
            messagingSenderId: "378475799461",
            appId: "1:378475799461:web:4775b4c857be19d5287e4c",
            measurementId: "G-0JW0SL0844"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        // ==========================================

        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const eventLayer = document.getElementById('previewCanvas');
        const pctx = eventLayer.getContext('2d');
        const refCanvas = document.getElementById('referenceCanvas');
        const refCtx = refCanvas.getContext('2d');

        const titleText = document.getElementById('status-title');
        const descText = document.getElementById('status-desc');
        const btnNext = document.getElementById('btnNext');
        const btnAnimate = document.getElementById('btnAnimate');
        const btnExportGIF = document.getElementById('btnExportGIF');
        
        const toolsDiv = document.getElementById('drawing-tools');
        const assembleDiv = document.getElementById('assemble-tools');
        const sizeInput = document.getElementById('size');
        const colorInput = document.getElementById('color');
        const scaleSlider = document.getElementById('scale-slider');
        const selectedPartNameTxt = document.getElementById('selected-part-name');

        const PARTS_LIST = [
            { id: 'head', name: '頭部 👦', desc: '請畫一個大大的頭！畫好後按綠色的【畫好了】喔！' },
            { id: 'torso', name: '身體 👕', desc: '看著淡淡的影子，幫他畫出可愛的身體吧！' },
            { id: 'rArm', name: '右手 💪', desc: '幫他畫一隻右手！(盡量往下直直畫喔)' },
            { id: 'rLeg', name: '右腳 🦵', desc: '幫他畫一隻右腳！(盡量往下直直畫喔)' },
            { id: 'lArm', name: '左手 💪', desc: '再來換畫左手囉！' },
            { id: 'lLeg', name: '左腳 🦵', desc: '最後畫上左腳，就快完成啦！' }
        ];
        
        let currentPartIndex = 0;
        let sysMode = 'draw';
        let partsData = {};
        let isDrawing = false;
        let drawMode = 'pen';
        let history = [];
        let historyStep = -1;

        let draggingPart = null;
        let draggingPivot = null;
        let selectedPartKey = null; 
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let animationId;
        let previewPending = false;
        let walkStartTime = 0;

        let gifWorkerUrl = '';
        fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js')
            .then(res => res.text())
            .then(text => {
                const blob = new Blob([text], {type: 'application/javascript'});
                gifWorkerUrl = URL.createObjectURL(blob);
            }).catch(e => console.warn("GIF Worker 載入失敗", e));

        // 啟動系統！
        initTools();
        resetDrawingState();
        updateUI();

        // ==================== 繪圖核心與工具 ====================
        function initTools() {
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.onclick = () => { 
                    colorInput.value = btn.dataset.color; 
                    updateColorPreview(); 
                }
            });
            colorInput.oninput = updateColorPreview;
            document.getElementById('pen').onclick = () => setDrawMode('pen');
            document.getElementById('eraser').onclick = () => setDrawMode('eraser');
            document.getElementById('fill').onclick = () => setDrawMode('fill');
            
            // 💡 修正的重點在這裡：已經移除了 document.getElementById('redo').onclick 的呼叫
            document.getElementById('undo').onclick = () => { if (historyStep > 0) { historyStep--; restoreState(historyStep); } };
            document.getElementById('clear').onclick = () => { if (confirm('確定要把這一步清空重畫嗎？🖍️')) resetDrawingState(); };
            
            sizeInput.oninput = () => document.getElementById('sizeVal').textContent = sizeInput.value;
            scaleSlider.oninput = (e) => {
                if (selectedPartKey) {
                    let newScale = parseFloat(e.target.value);
                    partsData[selectedPartKey].scale = newScale;
                    renderAssembly();
                }
            };
        }

        function updateColorPreview() {
            const col = colorInput.value;
            document.getElementById('currentColorPreview').style.background = col;
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.classList.toggle('selected', btn.dataset.color.toLowerCase() === col.toLowerCase());
            });
        }

        function setDrawMode(m) {
            drawMode = m;
            document.querySelectorAll('#pen, #eraser, #fill').forEach(b => b.classList.remove('active'));
            document.getElementById(m).classList.add('active');
        }

        function resetDrawingState() { ctx.clearRect(0, 0, canvas.width, canvas.height); history = [canvas.toDataURL()]; historyStep = 0; }
        function saveState() { historyStep++; if (historyStep < history.length) history = history.slice(0, historyStep); history.push(canvas.toDataURL()); }
        function restoreState(step) { if (step < 0 || step >= history.length) return; const img = new Image(); img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); }; img.src = history[step]; }

        function getPos(e) {
            const rect = eventLayer.getBoundingClientRect();
            let clientX, clientY;

            if (e.type.startsWith('touch')) {
                const touch = e.touches[0] || e.changedTouches[0];
                if (!touch) return { x: 0, y: 0 };
                clientX = touch.clientX;
                clientY = touch.clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            let x = Math.floor((clientX - rect.left) * (canvas.width / rect.width));
            let y = Math.floor((clientY - rect.top) * (canvas.height / rect.height));
            return { x: isNaN(x) ? 0 : x, y: isNaN(y) ? 0 : y };
        }

        function floodFill(startX, startY) {
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height), px = imgData.data, w = canvas.width, h = canvas.height;
            const startPos = (startY * w + startX) * 4;
            const targetColor = [px[startPos], px[startPos+1], px[startPos+2], px[startPos+3]];
            const hex = colorInput.value, fillRGBA = [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16), 255];
            if (targetColor[0] === fillRGBA[0] && targetColor[1] === fillRGBA[1] && targetColor[2] === fillRGBA[2]) return;

            const stack = [startX, startY], visited = new Uint8Array(w * h);
            while (stack.length > 0) {
                const y = stack.pop(), x = stack.pop();
                if (x < 0 || x >= w || y < 0 || y >= h) continue;
                const idx = y * w + x;
                if (visited[idx]) continue;
                const pos = idx * 4;
                if (px[pos] !== targetColor[0] || px[pos+1] !== targetColor[1] || px[pos+2] !== targetColor[2] || px[pos+3] !== targetColor[3]) continue;

                px[pos] = fillRGBA[0]; px[pos+1] = fillRGBA[1]; px[pos+2] = fillRGBA[2]; px[pos+3] = fillRGBA[3];
                visited[idx] = 1;
                stack.push(x+1, y, x-1, y, x, y+1, x, y-1);
            }
            ctx.putImageData(imgData, 0, 0); saveState();
        }

        function updateBrushPreview(x, y) {
            pctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
            if (sysMode !== 'draw') return;
            if (drawMode === 'fill') {
                pctx.strokeStyle = '#000'; pctx.lineWidth = 2; pctx.beginPath();
                pctx.moveTo(x-18, y); pctx.lineTo(x+18, y); pctx.moveTo(x, y-18); pctx.lineTo(x, y+18); pctx.stroke();
                pctx.fillStyle = colorInput.value; pctx.beginPath(); pctx.arc(x, y, 7, 0, Math.PI*2); pctx.fill(); pctx.stroke(); return;
            }
            const sz = parseInt(sizeInput.value);
            pctx.lineWidth = 2.5; pctx.strokeStyle = drawMode === 'eraser' ? '#ff4444' : '#333';
            pctx.setLineDash(drawMode === 'eraser' ? [8,6] : []);
            pctx.beginPath(); pctx.arc(x, y, sz, 0, Math.PI*2); pctx.stroke();
            pctx.globalAlpha = 0.2; pctx.fillStyle = drawMode === 'eraser' ? '#ff0000' : colorInput.value; pctx.fill(); pctx.globalAlpha = 1; pctx.setLineDash([]);
        }

        function handleStart(e) {
            if (e.type.startsWith('touch') && e.cancelable) e.preventDefault(); 

            const pos = getPos(e);
            if (sysMode === 'draw') {
                if (drawMode === 'fill') { floodFill(pos.x, pos.y); return; }
                isDrawing = true; 
                ctx.lineWidth = parseInt(sizeInput.value); 
                ctx.lineCap = ctx.lineJoin = 'round';
                ctx.globalCompositeOperation = drawMode === 'pen' ? 'source-over' : 'destination-out';
                ctx.strokeStyle = colorInput.value; 

                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                ctx.lineTo(pos.x + 0.1, pos.y); 
                ctx.stroke();
            } 
            else if (sysMode === 'assemble') {
                let keys = Object.keys(partsData).reverse(); 
                for (let key of keys) {
                    let p = partsData[key];
                    let pivotAbsX = p.x + p.pivotX * p.scale;
                    let pivotAbsY = p.y + p.pivotY * p.scale;
                    if (Math.hypot(pos.x - pivotAbsX, pos.y - pivotAbsY) < 25) {
                        draggingPivot = p; selectPart(key); eventLayer.style.cursor = 'crosshair'; return; 
                    }
                }
                for (let key of keys) {
                    let p = partsData[key];
                    let scaledW = p.w * p.scale; let scaledH = p.h * p.scale;
                    if (pos.x >= p.x && pos.x <= p.x + scaledW && pos.y >= p.y && pos.y <= p.y + scaledH) {
                        draggingPart = p; dragOffsetX = pos.x - p.x; dragOffsetY = pos.y - p.y;
                        selectPart(key); eventLayer.style.cursor = 'grabbing'; return;
                    }
                }
                selectPart(null);
            }
        }

        function handleMove(e) {
            if (e.type.startsWith('touch') && e.cancelable && (isDrawing || draggingPart || draggingPivot || e.target === eventLayer)) {
                e.preventDefault();
            }

            const pos = getPos(e);
            if (sysMode === 'draw') {
                if (!previewPending && e.target === eventLayer) { 
                    previewPending = true; 
                    requestAnimationFrame(() => { updateBrushPreview(pos.x, pos.y); previewPending = false; }); 
                }
                if (!isDrawing || drawMode === 'fill') return;
                
                ctx.lineTo(pos.x, pos.y); 
                ctx.stroke(); 
                ctx.beginPath(); 
                ctx.moveTo(pos.x, pos.y);
            } 
            else if (sysMode === 'assemble') {
                if (draggingPivot) {
                    let newPx = (pos.x - draggingPivot.x) / draggingPivot.scale;
                    let newPy = (pos.y - draggingPivot.y) / draggingPivot.scale;
                    draggingPivot.pivotX = Math.max(0, Math.min(newPx, draggingPivot.w));
                    draggingPivot.pivotY = Math.max(0, Math.min(newPy, draggingPivot.h));
                    renderAssembly();
                } else if (draggingPart) {
                    draggingPart.x = pos.x - dragOffsetX; draggingPart.y = pos.y - dragOffsetY;
                    renderAssembly();
                }
            }
        }

        function handleStop() {
            if (sysMode === 'draw' && isDrawing) { isDrawing = false; saveState(); }
            if (sysMode === 'assemble') { 
                draggingPart = null; draggingPivot = null; 
                eventLayer.style.cursor = 'grab'; 
            }
        }

        eventLayer.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleStop);
        eventLayer.addEventListener('mouseout', () => { pctx.clearRect(0,0,previewCanvas.width,previewCanvas.height); if(sysMode === 'draw' && !isDrawing) handleStop(); });
        
        eventLayer.addEventListener('touchstart', handleStart, {passive: false}); 
        window.addEventListener('touchmove', handleMove, {passive: false}); 
        window.addEventListener('touchend', handleStop);

        function updateUI() {
            if (currentPartIndex < PARTS_LIST.length) {
                sysMode = 'draw'; toolsDiv.style.display = 'flex'; assembleDiv.style.display = 'none';
                refCanvas.style.display = 'block'; 
                eventLayer.style.cursor = 'crosshair';
                
                titleText.innerText = `⭐ 第 ${currentPartIndex + 1}/6 步：畫 ${PARTS_LIST[currentPartIndex].name} ⭐`;
                descText.innerText = PARTS_LIST[currentPartIndex].desc;
            } else {
                sysMode = 'assemble'; toolsDiv.style.display = 'none'; assembleDiv.style.display = 'flex';
                refCanvas.style.display = 'none'; 
                pctx.clearRect(0,0,previewCanvas.width,previewCanvas.height);
                eventLayer.style.cursor = 'grab'; btnNext.style.display = 'none'; btnAnimate.style.display = 'block';
                
                titleText.innerText = `🧩 魔法拼圖時間！`;
                descText.innerHTML = `把手腳組合起來！拖拉<b style="color:red">「紅色大靶心🎯」</b>來設定關節！`;
                distributePartsForAssembly(); renderAssembly();
            }
        }

        function nextStep() {
            if (sysMode !== 'draw') return;
            const crop = autoCropCanvas();
            if (!crop) { alert("哎呀！畫布是空的喔，請畫點圖案吧！🖍️"); return; }
            const pId = PARTS_LIST[currentPartIndex].id;
            partsData[pId] = {
                img: crop.img, w: crop.w, h: crop.h, x: 0, y: 0, scale: 1.0,
                pivotX: crop.w / 2, pivotY: pId === 'head' ? crop.h * 0.9 : pId === 'torso' ? crop.h / 2 : crop.h * 0.1 
            };
            
            refCtx.drawImage(canvas, 0, 0); 
            currentPartIndex++; resetDrawingState(); updateUI();
        }

        function autoCropCanvas() {
            const w = canvas.width, h = canvas.height, imgData = ctx.getImageData(0, 0, w, h).data;
            let minX = w, minY = h, maxX = 0, maxY = 0, hasPixels = false;
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    if (imgData[(y * w + x) * 4 + 3] > 0) { 
                        hasPixels = true; if (x < minX) minX = x; if (x > maxX) maxX = x; if (y < minY) minY = y; if (y > maxY) maxY = y;
                    }
                }
            }
            if (!hasPixels) return null;
            const pad = 5; minX = Math.max(0, minX - pad); minY = Math.max(0, minY - pad); maxX = Math.min(w, maxX + pad); maxY = Math.min(h, maxY + pad);
            const cropW = maxX - minX, cropH = maxY - minY;
            const tmpCanvas = document.createElement('canvas'); tmpCanvas.width = cropW; tmpCanvas.height = cropH;
            tmpCanvas.getContext('2d').drawImage(canvas, minX, minY, cropW, cropH, 0, 0, cropW, cropH);
            return { img: tmpCanvas, w: cropW, h: cropH };
        }

        function selectPart(key) {
            selectedPartKey = key;
            if (key) {
                let partName = PARTS_LIST.find(p => p.id === key).name;
                selectedPartNameTxt.innerText = partName;
                scaleSlider.disabled = false; scaleSlider.value = partsData[key].scale;
            } else {
                selectedPartNameTxt.innerText = "尚未選取"; scaleSlider.disabled = true; scaleSlider.value = 1;
            }
            renderAssembly();
        }

        function distributePartsForAssembly() {
            partsData.head.x = 350; partsData.head.y = 50; partsData.torso.x = 350; partsData.torso.y = 200;
            partsData.lArm.x = 100; partsData.lArm.y = 200; partsData.rArm.x = 600; partsData.rArm.y = 200;
            partsData.lLeg.x = 250; partsData.lLeg.y = 400; partsData.rLeg.x = 450; partsData.rLeg.y = 400;
        }

        function renderAssembly() {
            if (sysMode !== 'assemble') return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const drawOrder = ['rArm', 'rLeg', 'torso', 'head', 'lArm', 'lLeg'];
            
            for (let key of drawOrder) {
                let p = partsData[key];
                if (p) {
                    ctx.save(); ctx.translate(p.x, p.y); ctx.scale(p.scale, p.scale); ctx.drawImage(p.img, 0, 0);
                    if (key === selectedPartKey) {
                        ctx.strokeStyle = '#2196f3'; ctx.lineWidth = 5 / p.scale; 
                        ctx.setLineDash([8 / p.scale, 8 / p.scale]); ctx.strokeRect(0, 0, p.w, p.h); ctx.setLineDash([]);
                    }
                    ctx.restore();
                }
            }
            
            for (let key of drawOrder) {
                let p = partsData[key];
                if (p) {
                    const cx = p.x + p.pivotX * p.scale; const cy = p.y + p.pivotY * p.scale;
                    ctx.fillStyle = '#ff1744'; ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI * 2); ctx.fill(); 
                    ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2); ctx.fill();  
                    ctx.strokeStyle = '#000000'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI * 2); ctx.stroke();
                }
            }
        }

        function startAnimation() {
            sysMode = 'animate';
            btnAnimate.style.display = 'none'; assembleDiv.style.display = 'none';
            btnExportGIF.style.display = 'block'; eventLayer.style.cursor = 'default';
            titleText.innerText = `✨ 哇！你的角色活過來了！✨`;
            descText.innerText = `點擊紫色按鈕，把它發送到大螢幕上跟大家一起玩！`;

            const torsoP = partsData.torso;
            const rootX = torsoP.x + torsoP.pivotX * torsoP.scale;
            const rootY = torsoP.y + torsoP.pivotY * torsoP.scale;

            for (let key in partsData) {
                let p = partsData[key];
                p.relativeX = (p.x + p.pivotX * p.scale) - rootX;
                p.relativeY = (p.y + p.pivotY * p.scale) - rootY;
            }

            walkStartTime = Date.now();
            requestAnimationFrame(drawFrameLive);
        }

        function renderWalkCycleFrame(targetCtx, timeT) {
            let swing = Math.sin(timeT) * 0.6; 
            let bounce = Math.abs(Math.sin(timeT * 2)) * 12; 

            const torsoP = partsData.torso;
            const rootX = torsoP.x + torsoP.pivotX * torsoP.scale;
            const rootY = torsoP.y + torsoP.pivotY * torsoP.scale;

            let currentRootX = rootX;
            let currentRootY = rootY - bounce;

            const drawOrder = ['rArm', 'rLeg', 'torso', 'head', 'lArm', 'lLeg'];

            for (let key of drawOrder) {
                let p = partsData[key];
                let angle = 0;
                if (key === 'lArm' || key === 'rLeg') angle = -swing;
                if (key === 'rArm' || key === 'lLeg') angle = swing;
                if (key === 'head') angle = Math.sin(timeT*2) * 0.05; 
                if (key === 'torso') angle = Math.sin(timeT) * 0.05;  

                targetCtx.save();
                targetCtx.translate(currentRootX + p.relativeX, currentRootY + p.relativeY);
                targetCtx.rotate(angle);
                targetCtx.scale(p.scale, p.scale);
                targetCtx.drawImage(p.img, -p.pivotX, -p.pivotY);
                targetCtx.restore();
            }
        }

        function drawFrameLive() {
            if (sysMode !== 'animate') return;
            let t = (Date.now() - walkStartTime) / 250; 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            renderWalkCycleFrame(ctx, t);
            animationId = requestAnimationFrame(drawFrameLive);
        }

        function exportGIF() {
            btnExportGIF.disabled = true;
            btnExportGIF.innerText = "⏳ 正在打包準備發送...";

            const scaleFactor = 0.5;
            const offScreenCanvas = document.createElement('canvas');
            offScreenCanvas.width = canvas.width * scaleFactor;
            offScreenCanvas.height = canvas.height * scaleFactor;
            const offScreenCtx = offScreenCanvas.getContext('2d', { willReadFrequently: true });

            const gifConfig = {
                workers: 2, quality: 10, width: offScreenCanvas.width, height: offScreenCanvas.height,
                transparent: 0x00FF00, 
                workerScript: gifWorkerUrl || 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js'
            };
            const gif = new GIF(gifConfig);
            const framesCount = 30; 

            for (let i = 0; i < framesCount; i++) {
                let t = (i / framesCount) * Math.PI * 2;
                offScreenCtx.fillStyle = '#00fb00';
                offScreenCtx.fillRect(0, 0, offScreenCanvas.width, offScreenCanvas.height);
                offScreenCtx.save();
                offScreenCtx.scale(scaleFactor, scaleFactor);
                renderWalkCycleFrame(offScreenCtx, t);
                offScreenCtx.restore();
                
                const imgData = offScreenCtx.getImageData(0, 0, offScreenCanvas.width, offScreenCanvas.height);
                const data = imgData.data;
                for (let j = 0; j < data.length; j += 4) {
                    if (data[j + 3] < 128) {
                        data[j] = 0; data[j + 1] = 255; data[j + 2] = 0; data[j + 3] = 255; 
                    } else {
                        data[j + 3] = 255; 
                        if (data[j] === 0 && data[j + 1] === 255 && data[j + 2] === 0) data[j + 1] = 254; 
                    }
                }
                offScreenCtx.putImageData(imgData, 0, 0);
                gif.addFrame(imgData, { delay: 50 }); 
            }

            gif.on('finished', function(blob) {
                btnExportGIF.innerText = "🚀 正在飛往大螢幕...";
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = function() {
                    const base64data = reader.result;
                    db.ref('characters').push({
                        data: base64data,
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    }).then(() => {
                        btnExportGIF.disabled = false;
                        btnExportGIF.innerText = "✅ 發送成功！你可以去電視上找找看囉！";
                    }).catch((error) => {
                        console.error("上傳失敗：", error);
                        alert("上傳失敗了，請請教老師幫忙確認網路喔！");
                        btnExportGIF.disabled = false;
                        btnExportGIF.innerText = "❌ 發送失敗，再試一次";
                    });
                }
            });

            gif.render();
        }

        document.addEventListener('keydown', e => {
            if (sysMode !== 'draw') return;
            if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === 'z') { e.preventDefault(); document.getElementById('undo').click(); }
            if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); /* Redo removed */ }
        });
    </script>
</body>
